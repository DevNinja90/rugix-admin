name: Build

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - "*"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build_frontend:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install Sidex
        uses: jdx/mise-action@v4
        with:
          install_args: "github:silitics/sidex"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build Frontend
        working-directory: frontend
        run: pnpm run build
      - name: Upload Frontend Dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  build_binaries_linux:
    name: "Build Binary (${{ matrix.target }})"
    runs-on: ubuntu-latest
    needs:
      - build_frontend
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-musleabihf
          - armv7-unknown-linux-gnueabihf
          - arm-unknown-linux-musleabihf
          - arm-unknown-linux-gnueabihf
          - arm-unknown-linux-musleabi
          - arm-unknown-linux-gnueabi
          - x86_64-unknown-linux-musl
          - x86_64-unknown-linux-gnu
          - i686-unknown-linux-musl
          - riscv64gc-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Download Frontend Dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build Binary
        run: ./scripts/build-binaries.sh ${{ matrix.target }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target }}
          path: build/binaries/binaries-${{ matrix.target }}.tar
          if-no-files-found: error

  upload_release_assets:
    name: "Upload Release Assets"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build_binaries_linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Download Binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: build/binaries
          merge-multiple: true
      - name: List Assets
        run: find build/binaries
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} build/binaries/* --clobber
